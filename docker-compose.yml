services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: dataroom
      POSTGRES_PASSWORD: dataroom
      POSTGRES_DB: dataroom
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dataroom"]
      interval: 2s
      timeout: 3s
      retries: 15

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || exit 1"]
      interval: 2s
      timeout: 3s
      retries: 15

  createbucket:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin) do echo 'waiting for minio'; sleep 1; done;
      /usr/bin/mc mb --ignore-existing local/dataroom;
      exit 0;
      "

volumes:
  pgdata:
  miniodata:
